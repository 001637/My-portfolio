<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
    }

    .card{
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(12px);
        padding: 50px 40px;
        border-radius: 20px;
        text-align: center;
        color: white;
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        width: 90%;
        max-width: 450px;
        animation: fadeIn 1.2s ease;
    }

    .card h1{
        font-size: 40px;
        margin-bottom: 10px;
    }

    .card p{
        font-size: 18px;
        color: #dbeafe;
        margin-bottom: 30px;
    }

    .btn{
        display:inline-block;
        text-decoration:none;
        background: white;
        color: #1e3a8a;
        padding: 14px 35px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 50px;
        transition: 0.3s;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .btn:hover{
        background:#dbeafe;
        transform: scale(1.05);
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform: translateY(30px);
        }
        to{
            opacity:1;
            transform: translateY(0);
        }
    }
</style>
</head>
<body>

<div class="card">
    <h1>Hello, I'm Himanshu</h1>
    <p>Welcome to my portfolio website.</p>
    <a href="file:///C:/Users/User/Documents/page3.html"target="_blank"
    class="btn">View Portfolio</a>
</div>

</body>
</html>
