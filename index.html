<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access My Portfolio</title>
<style>
*{
margin:0;
 padding:0;
 box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}
body{
min-height:100vh;
 display:flex;
justify-content:center;
align-items:center;
 background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
 padding:20px;
}
.container{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);
webkit-backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.2);
border-radius:24px;
padding:35px 30px;
text-align:center;
color:#fff;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
}
.profile-img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:4px solid rgba(255,255,255,0.8);
display: block;
 margin: 0 auto;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
h1{
font-size:30px;
margin-bottom:8px;
}
.subtitle{
font-size:14px;
color:#dbeafe;
margin-bottom:25px;
line-height:1.5;
}
.input-box{
margin-bottom:18px;
text-align:left;
}
.input-box label{
display:block;
 margin-bottom:6px;
font-size:14px;
font-weight:600;
}
.input-box input{
 width:100%;
 padding:13px 15px;
border:none;
outline:none;
border-radius:12px;
font-size:15px;
background:rgba(255,255,255,0.95);
color:#111827;
}
button{
width:100%;
 padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 25px rgba(6,182,212,0.35);
}
button:hover{
transform:translateY(-2px);
}
#error{
 min-height:20px;
 margin-top:12px;
 color:#fecaca;
font-size:14px;
}
.footer{
margin-top:20px;
font-size:12px;
color:#cbd5e1;
}
</style>
</head>
<body>
<div class="container">
 <img src="https://i.imgur.com/2DhmtJ4.png" alt="Profile Photo" class="profile-img">
 <h1>Welcome</h1>
 <p class="subtitle">
 Please enter your details to access my professional portfolio.
 </p>
<div class="input-box">
<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your full name">
</div>
<div class="input-box">
<label>Mobile Number</label>
 <input type="tel" id="mobile" placeholder="Enter your 10-digit mobile number" maxlength="10">
</div>
 <button onclick="validateForm()">View Portfolio</button>
<p id="error"></p>
 <div class="footer">
 © 2026 My Portfolio | Designed by Manjit Kaur
</div>
</div>
<script>
function validateForm() {
    const name = document.getElementById("name").value.trim();
    const mobile = document.getElementById("mobile").value.trim();
    const error = document.getElementById("error");
    if (name === "") {
 error.innerText = "Please enter your full name.";
 return;
    }
    if (!/^[A-Za-z ]{3,}$/.test(name)) {
 error.innerText = "Name must contain at least 3 letters.";
return;
    }
    if (!/^[0-9]{10}$/.test(mobile)) {
 error.innerText = "Please enter a valid 10-digit mobile number.";
 return;
    }
error.innerText = "";
    // Next page open
    window.location.href = "about.html";
}
</script>
</body>
</html>
