<!-- SUCCESS PAGE -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Submitted</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #0f172a, #1e3a8a);
}

.success-box{
    background:white;
    width:90%;
    max-width:500px;
    padding:40px 30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    animation:fadeIn 1s ease;
}

.success-box img{
    width:140px;
    margin-bottom:20px;
}

.success-box h1{
    color:#16a34a;
    font-size:32px;
    margin-bottom:15px;
}

.success-box p{
    color:#555;
    font-size:18px;
    line-height:1.6;
    margin-bottom:30px;
}

.success-box a{
    display:inline-block;
    padding:12px 30px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
}

.success-box a:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="success-box">
    <img src="https://cdn-icons-png.flaticon.com/512/845/845646.png" alt="Success">
    
    <h1>Thank You!</h1>
    
    <p>
        Your message has been successfully submitted.<br>
        We will get back to you as soon as possible.
    </p>
    
    <a href="projrcts.html">Back to Home</a>
</div>

</body>
</html>
